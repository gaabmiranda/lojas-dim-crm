# Apenas Postgres pra dev local. App roda fora do compose com `npm run dev` (hot-reload).
# Em produção (Coolify), app + postgres são containers separados gerenciados pelo Coolify.
services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crm -d crm']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: crm-postgres-data
